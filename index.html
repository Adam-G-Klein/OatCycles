<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OatCycles</title>
  </head>
  <body>
    <header id="topbar">
      <h1>OatCycles</h1>
      <div class="controls">
        <button id="play" title="Ctrl+Enter">▶ Play</button>
        <button id="stop" title="Ctrl+.">■ Stop</button>
      </div>
      <label id="vim-toggle" title="Vim keybindings — :w plays, :q stops, gc comments">
        <input type="checkbox" id="vim-mode" />
        <span>Vim</span>
      </label>
      <span id="status">booting…</span>
    </header>
    <main id="editor"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
